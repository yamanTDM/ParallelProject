
spring.application.name=Parallel
spring.datasource.url=jdbc:mysql://localhost:3306/simple_store
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
jwt.secret=MySuperSecretKeyForJwtAuthentication123456
jwt.expiration=86400000

logging.pattern.console=%d{HH:mm:ss.SSS} [%X{traceId:--}] %highlight(%-5level) %cyan(%logger{36}) - %msg%n
logging.level.com.example.Parallel.aspect=DEBUG


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

